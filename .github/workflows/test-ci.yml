name: Test Suite CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BASE_URL: https://thinking-tester-contact-list.herokuapp.com
  API_URL: https://thinking-tester-contact-list.herokuapp.com
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

jobs:
  # ── API Tests (fast, no browser needed) ────────────────────
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run API tests
        run: npx playwright test --project=api --reporter=list,json
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: reports/api-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: reports/

  # ── UI Tests — Sharded across browsers ─────────────────────
  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run UI tests (${{ matrix.project }} shard ${{ matrix.shard }})
        run: |
          npx playwright test \
            --project=${{ matrix.project }} \
            --shard=${{ matrix.shard }} \
            --grep-invert="@api|@integration"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-results-${{ matrix.project }}-${{ strategy.job-index }}
          path: |
            reports/
            test-results/
            allure-results/

  # ── Integration Tests ──────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - name: Run integration tests
        run: npx playwright test --grep @integration --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: |
            reports/
            test-results/

  # ── Merge Reports & Publish ────────────────────────────────
  report:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-results/
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Merge HTML reports
        run: npx playwright merge-reports --reporter=html all-results/
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: full-test-report
          path: playwright-report/
          retention-days: 14

  # ── Notify on failure ─────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [api-tests, ui-tests, integration-tests]
    if: failure()
    steps:
      - name: Post failure to GitHub Summary
        run: |
          echo "## ❌ Test Suite Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more test jobs failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
